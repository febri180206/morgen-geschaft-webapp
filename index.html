<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Morgen Geschäft</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --accent: #1ba784;
    --accent-soft: #e3f5ef;
    --radius: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #1c1c1e);
    padding: 16px 16px 32px;
  }

  .greeting {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .greeting-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: white;
    font-weight: 600;
    flex-shrink: 0;
  }

  .greeting-text-time {
    font-size: 13px;
    color: var(--tg-theme-hint-color, #8b8b8f);
    margin: 0 0 2px;
  }

  .greeting-text-name {
    font-size: 19px;
    font-weight: 700;
    margin: 0;
  }

  .store-banner {
    background: linear-gradient(135deg, var(--accent), #14806a);
    border-radius: var(--radius);
    padding: 18px;
    color: white;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .store-banner::after {
    content: "🌿";
    position: absolute;
    right: -10px;
    top: -10px;
    font-size: 90px;
    opacity: 0.15;
  }

  .store-banner h2 {
    margin: 0 0 4px;
    font-size: 17px;
    font-weight: 700;
  }

  .store-banner p {
    margin: 0;
    font-size: 13px;
    opacity: 0.92;
  }

  .section-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--tg-theme-hint-color, #8b8b8f);
    margin: 24px 0 10px;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .menu-btn {
    background: var(--tg-theme-secondary-bg-color, #f4f4f5);
    border: none;
    border-radius: var(--radius);
    padding: 16px 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 8px;
    color: var(--tg-theme-text-color, #1c1c1e);
    transition: transform 0.12s ease;
  }

  .menu-btn:active {
    transform: scale(0.97);
  }

  .menu-btn-icon {
    font-size: 22px;
  }

  .menu-btn-label {
    font-size: 14px;
    font-weight: 600;
  }

  .card {
    background: var(--tg-theme-secondary-bg-color, #f4f4f5);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }

  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    font-size: 14px;
  }

  .cart-item-name {
    flex: 1;
    padding-right: 8px;
  }

  .cart-item-sub {
    color: var(--tg-theme-hint-color, #8b8b8f);
    font-size: 12px;
  }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--tg-theme-hint-color, #d6d6d8);
    margin-top: 8px;
    padding-top: 10px;
    font-weight: 700;
  }

  .order-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .order-id {
    font-weight: 700;
    font-size: 14px;
  }

  .order-date {
    font-size: 12px;
    color: var(--tg-theme-hint-color, #8b8b8f);
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 100px;
  }

  .badge-menunggu { background: #fff3d6; color: #92660b; }
  .badge-dikonfirmasi { background: var(--accent-soft); color: var(--accent); }
  .badge-ditolak { background: #fde4e4; color: #c23434; }

  .order-items {
    margin-top: 8px;
    font-size: 13px;
    color: var(--tg-theme-hint-color, #8b8b8f);
  }

  .empty-state {
    text-align: center;
    padding: 28px 16px;
    color: var(--tg-theme-hint-color, #8b8b8f);
  }

  .empty-state-icon {
    font-size: 32px;
    margin-bottom: 8px;
  }

  .empty-state-text {
    font-size: 14px;
  }

  .skeleton {
    background: var(--tg-theme-secondary-bg-color, #f0f0f0);
    border-radius: var(--radius);
    height: 56px;
    margin-bottom: 10px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

  <div class="greeting">
    <div class="greeting-avatar" id="avatarInitial">F</div>
    <div>
      <p class="greeting-text-time" id="sapaanWaktu">Halo</p>
      <p class="greeting-text-name" id="namaUser">Pelanggan</p>
    </div>
  </div>

  <div class="store-banner">
    <h2>Morgen Geschäft</h2>
    <p>Skincare pilihan untuk kulit yang lebih sehat 🌿</p>
  </div>

  <div class="section-label">Menu</div>
  <div class="menu-grid">
    <button class="menu-btn" onclick="bukaMenu('catalog')">
      <span class="menu-btn-icon">🛍</span>
      <span class="menu-btn-label">Lihat Katalog</span>
    </button>
    <button class="menu-btn" onclick="bukaMenu('cart')">
      <span class="menu-btn-icon">🛒</span>
      <span class="menu-btn-label">Keranjang Saya</span>
    </button>
    <button class="menu-btn" onclick="bukaMenu('help')">
      <span class="menu-btn-icon">ℹ️</span>
      <span class="menu-btn-label">Bantuan</span>
    </button>
    <button class="menu-btn" onclick="bukaMenu('contact_admin')">
      <span class="menu-btn-icon">👨‍💻</span>
      <span class="menu-btn-label">Hubungi Admin</span>
    </button>
  </div>

  <div class="section-label">Keranjang Saat Ini</div>
  <div id="cartContainer">
    <div class="skeleton"></div>
  </div>

  <div class="section-label">Riwayat Pesanan</div>
  <div id="riwayatContainer">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

<script>
  // ============ GANTI URL INI sesuai backend ngrok kamu ============
  const API_BASE_URL = "https://clicker-ought-bankable.ngrok-free.dev";
  // ===================================================================

  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  function rupiah(angka) {
    return "Rp" + Number(angka).toLocaleString("id-ID");
  }

  function sapaanWaktu() {
    const jam = new Date().getHours();
    if (jam >= 5 && jam < 11) return "Selamat Pagi";
    if (jam >= 11 && jam < 15) return "Selamat Siang";
    if (jam >= 15 && jam < 18) return "Selamat Sore";
    return "Selamat Malam";
  }

  function bukaMenu(target) {
    if (tg) {
      // Kirim data balik ke bot, bot akan proses dan tampilkan menu yang sesuai
      tg.sendData(JSON.stringify({ action: target }));
    } else {
      alert("Buka dari dalam Telegram untuk navigasi menu.");
    }
  }

  function badgeClass(status) {
    if (status === "dikonfirmasi") return "badge-dikonfirmasi";
    if (status === "ditolak") return "badge-ditolak";
    return "badge-menunggu";
  }

  function badgeLabel(status) {
    if (status === "dikonfirmasi") return "Dikonfirmasi";
    if (status === "ditolak") return "Ditolak";
    return "Menunggu Verifikasi";
  }

  function renderCart(items, total) {
    const container = document.getElementById("cartContainer");
    if (!items.length) {
      container.innerHTML = `
        <div class="card empty-state">
          <div class="empty-state-icon">🛒</div>
          <div class="empty-state-text">Keranjang kamu masih kosong</div>
        </div>`;
      return;
    }

    let html = '<div class="card">';
    items.forEach(item => {
      html += `
        <div class="cart-item">
          <span class="cart-item-name">${item.nama} <span class="cart-item-sub">x${item.qty}</span></span>
          <span>${rupiah(item.subtotal)}</span>
        </div>`;
    });
    html += `<div class="cart-total-row"><span>Total</span><span>${rupiah(total)}</span></div>`;
    html += "</div>";
    container.innerHTML = html;
  }

  function renderRiwayat(riwayat) {
    const container = document.getElementById("riwayatContainer");
    if (!riwayat.length) {
      container.innerHTML = `
        <div class="card empty-state">
          <div class="empty-state-icon">📦</div>
          <div class="empty-state-text">Belum ada riwayat pesanan</div>
        </div>`;
      return;
    }

    let html = "";
    riwayat.forEach(order => {
      const namaItems = order.items.map(it => `${it.nama} x${it.qty}`).join(", ");
      html += `
        <div class="card">
          <div class="order-row">
            <span class="order-id">Pesanan #${order.order_id}</span>
            <span class="badge ${badgeClass(order.status)}">${badgeLabel(order.status)}</span>
          </div>
          <div class="order-date">${order.created_at}</div>
          <div class="order-items">${namaItems}</div>
          <div class="cart-total-row"><span>Total</span><span>${rupiah(order.total)}</span></div>
        </div>`;
    });
    container.innerHTML = html;
  }

  async function muatData() {
    const user = tg?.initDataUnsafe?.user;
    const namaDepan = user?.first_name || "Pelanggan";
    const userId = user?.id;

    document.getElementById("sapaanWaktu").textContent = sapaanWaktu() + ",";
    document.getElementById("namaUser").textContent = namaDepan;
    document.getElementById("avatarInitial").textContent = namaDepan.charAt(0).toUpperCase();

    if (!userId) {
      document.getElementById("cartContainer").innerHTML =
        '<div class="card empty-state"><div class="empty-state-text">Buka dari dalam Telegram untuk melihat data kamu.</div></div>';
      document.getElementById("riwayatContainer").innerHTML = "";
      return;
    }

    try {
      const res = await fetch(`${API_BASE_URL}/api/user-data?user_id=${userId}`, {
        headers: { "ngrok-skip-browser-warning": "true" }
      });
      if (!res.ok) throw new Error("Gagal memuat data");
      const data = await res.json();
      renderCart(data.keranjang || [], data.total_keranjang || 0);
      renderRiwayat(data.riwayat_pesanan || []);
    } catch (err) {
      document.getElementById("cartContainer").innerHTML =
        '<div class="card empty-state"><div class="empty-state-text">Gagal memuat data. Coba lagi nanti.</div></div>';
      document.getElementById("riwayatContainer").innerHTML = "";
      console.error(err);
    }
  }

  muatData();
</script>
</body>
</html>
